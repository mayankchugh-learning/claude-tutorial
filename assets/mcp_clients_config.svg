<svg width="100%" viewBox="0 0 800 280" role="img" xmlns="http://www.w3.org/2000/svg">

      <!-- Clients column -->
      <text x="100" y="24" text-anchor="middle" fill="#6b6580" font-family="Space Grotesk" font-size="12" font-weight="600" text-transform="uppercase">Clients</text>
      <rect x="30" y="40" width="140" height="44" rx="8" fill="rgba(124,109,250,0.12)" stroke="rgba(124,109,250,0.35)" stroke-width="1.5"/>
      <text x="100" y="58" text-anchor="middle" fill="#c4b5fd" font-family="Space Grotesk" font-weight="600" font-size="13">Claude Code</text>
      <text x="100" y="74" text-anchor="middle" fill="#7c6dfa" font-family="Space Grotesk" font-size="11">(terminal)</text>
      <rect x="30" y="95" width="140" height="44" rx="8" fill="rgba(56,189,248,0.1)" stroke="rgba(56,189,248,0.3)" stroke-width="1.5"/>
      <text x="100" y="113" text-anchor="middle" fill="#38bdf8" font-family="Space Grotesk" font-weight="600" font-size="13">VS Code</text>
      <text x="100" y="129" text-anchor="middle" fill="#38bdf8" font-family="Space Grotesk" font-size="11">(extension)</text>
      <rect x="30" y="150" width="140" height="44" rx="8" fill="rgba(52,211,153,0.1)" stroke="rgba(52,211,153,0.3)" stroke-width="1.5"/>
      <text x="100" y="168" text-anchor="middle" fill="#34d399" font-family="Space Grotesk" font-weight="600" font-size="13">Cursor</text>
      <rect x="30" y="205" width="140" height="44" rx="8" fill="rgba(251,191,36,0.08)" stroke="rgba(251,191,36,0.3)" stroke-width="1.5"/>
      <text x="100" y="223" text-anchor="middle" fill="#fbbf24" font-family="Space Grotesk" font-weight="600" font-size="13">Claude Desktop</text>

      <!-- USB-C label -->
      <rect x="190" y="120" width="120" height="36" rx="8" fill="rgba(124,109,250,0.15)" stroke="rgba(124,109,250,0.4)" stroke-width="1.5"/>
      <text x="250" y="134" text-anchor="middle" fill="#c4b5fd" font-family="Space Grotesk" font-weight="600" font-size="12">MCP Config</text>
      <text x="250" y="148" text-anchor="middle" fill="#7c6dfa" font-family="Space Grotesk" font-size="10">.mcp.json</text>
      <!-- Arrows from clients to config -->
      <line x1="170" y1="130" x2="190" y2="138" stroke="rgba(124,109,250,0.3)" stroke-width="1.5"/>

      <!-- Arrows from config to servers -->
      <line x1="310" y1="138" x2="360" y2="80" stroke="rgba(124,109,250,0.3)" stroke-width="1.5" marker-end="url(#arrowP)"/>
      <line x1="310" y1="138" x2="360" y2="138" stroke="rgba(124,109,250,0.3)" stroke-width="1.5" marker-end="url(#arrowP)"/>
      <line x1="310" y1="138" x2="360" y2="196" stroke="rgba(124,109,250,0.3)" stroke-width="1.5" marker-end="url(#arrowP)"/>

      <!-- MCP Servers column -->
      <text x="570" y="24" text-anchor="middle" fill="#6b6580" font-family="Space Grotesk" font-size="12" font-weight="600">MCP Servers (Tools)</text>
      <rect x="370" y="44" width="400" height="50" rx="10" fill="rgba(52,211,153,0.08)" stroke="rgba(52,211,153,0.3)" stroke-width="1.5"/>
      <text x="570" y="65" text-anchor="middle" fill="#34d399" font-family="Space Grotesk" font-weight="600" font-size="13">Playwright (Microsoft) — Browser Automation</text>
      <text x="570" y="81" text-anchor="middle" fill="#4b5563" font-family="Space Grotesk" font-size="11">Local (stdio) · uvx @playwright/mcp</text>
      <rect x="370" y="106" width="400" height="50" rx="10" fill="rgba(56,189,248,0.08)" stroke="rgba(56,189,248,0.3)" stroke-width="1.5"/>
      <text x="570" y="127" text-anchor="middle" fill="#38bdf8" font-family="Space Grotesk" font-weight="600" font-size="13">Tavily Search — AI Web Search</text>
      <text x="570" y="143" text-anchor="middle" fill="#4b5563" font-family="Space Grotesk" font-size="11">Hosted (HTTPS) · Requires API key</text>
      <rect x="370" y="168" width="400" height="50" rx="10" fill="rgba(251,191,36,0.08)" stroke="rgba(251,191,36,0.3)" stroke-width="1.5"/>
      <text x="570" y="189" text-anchor="middle" fill="#fbbf24" font-family="Space Grotesk" font-weight="600" font-size="13">DuckDuckGo Search — Free web search</text>
      <text x="570" y="205" text-anchor="middle" fill="#4b5563" font-family="Space Grotesk" font-size="11">Local (stdio) · uvx duckduckgo-mcp-server</text>
      <rect x="370" y="230" width="400" height="36" rx="10" fill="rgba(248,113,113,0.08)" stroke="rgba(248,113,113,0.25)" stroke-width="1.5"/>
      <text x="570" y="252" text-anchor="middle" fill="#f87171" font-family="Space Grotesk" font-size="12">+ GitHub · Gmail · Notion · Slack · Firebase · Figma...</text>
    
</svg>
