<svg width="100%" viewBox="0 0 800 280" role="img" xmlns="http://www.w3.org/2000/svg">

      <defs>
        <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%" style="stop-color:#7c6dfa"/>
          <stop offset="100%" style="stop-color:#38bdf8"/>
        </linearGradient>
      </defs>

      <!-- Anthropic box -->
      <rect x="300" y="20" width="200" height="56" rx="12" fill="rgba(124,109,250,0.15)" stroke="rgba(124,109,250,0.5)" stroke-width="1.5"/>
      <text x="400" y="44" text-anchor="middle" fill="#e8e6f0" font-family="Space Grotesk" font-weight="600" font-size="16">Anthropic</text>
      <text x="400" y="64" text-anchor="middle" fill="#a09bb8" font-family="Space Grotesk" font-size="12">Parent Company</text>

      <!-- Connector lines down -->
      <line x1="400" y1="76" x2="400" y2="120" stroke="rgba(124,109,250,0.4)" stroke-width="1.5" stroke-dasharray="4,4"/>
      <line x1="400" y1="120" x2="160" y2="120" stroke="rgba(124,109,250,0.4)" stroke-width="1.5"/>
      <line x1="400" y1="120" x2="640" y2="120" stroke="rgba(124,109,250,0.4)" stroke-width="1.5"/>
      <line x1="160" y1="120" x2="160" y2="140" stroke="rgba(124,109,250,0.4)" stroke-width="1.5"/>
      <line x1="400" y1="120" x2="400" y2="140" stroke="rgba(124,109,250,0.4)" stroke-width="1.5"/>
      <line x1="640" y1="120" x2="640" y2="140" stroke="rgba(124,109,250,0.4)" stroke-width="1.5"/>

      <!-- Haiku box -->
      <rect x="70" y="140" width="180" height="100" rx="12" fill="rgba(52,211,153,0.1)" stroke="rgba(52,211,153,0.4)" stroke-width="1.5"/>
      <text x="160" y="168" text-anchor="middle" fill="#34d399" font-family="Space Grotesk" font-weight="700" font-size="17">Haiku</text>
      <text x="160" y="188" text-anchor="middle" fill="#a09bb8" font-family="Space Grotesk" font-size="12">Smallest / Fastest</text>
      <text x="160" y="206" text-anchor="middle" fill="#4b5563" font-family="Space Grotesk" font-size="11">$1 / 1M tokens</text>
      <text x="160" y="224" text-anchor="middle" fill="#4b5563" font-family="Space Grotesk" font-size="11">Best for simple tasks</text>

      <!-- Sonnet box (highlighted) -->
      <rect x="310" y="140" width="180" height="100" rx="12" fill="rgba(124,109,250,0.18)" stroke="rgba(124,109,250,0.7)" stroke-width="2"/>
      <text x="400" y="164" text-anchor="middle" fill="#c4b5fd" font-family="Space Grotesk" font-weight="700" font-size="17">Sonnet ★</text>
      <text x="400" y="184" text-anchor="middle" fill="#a09bb8" font-family="Space Grotesk" font-size="12">Balanced / Recommended</text>
      <text x="400" y="202" text-anchor="middle" fill="#4b5563" font-family="Space Grotesk" font-size="11">$6 / 1M tokens</text>
      <text x="400" y="220" text-anchor="middle" fill="#4b5563" font-family="Space Grotesk" font-size="11">Daily development</text>
      <text x="400" y="238" text-anchor="middle" fill="#7c6dfa" font-family="Space Grotesk" font-size="10" font-weight="600">AUTHOR'S PICK</text>

      <!-- Opus box -->
      <rect x="550" y="140" width="180" height="100" rx="12" fill="rgba(251,191,36,0.08)" stroke="rgba(251,191,36,0.35)" stroke-width="1.5"/>
      <text x="640" y="168" text-anchor="middle" fill="#fbbf24" font-family="Space Grotesk" font-weight="700" font-size="17">Opus</text>
      <text x="640" y="188" text-anchor="middle" fill="#a09bb8" font-family="Space Grotesk" font-size="12">Most Powerful</text>
      <text x="640" y="206" text-anchor="middle" fill="#4b5563" font-family="Space Grotesk" font-size="11">1M context window</text>
      <text x="640" y="224" text-anchor="middle" fill="#4b5563" font-family="Space Grotesk" font-size="11">Complex reasoning</text>
    
</svg>
