<svg width="100%" viewBox="0 0 800 360" role="img" xmlns="http://www.w3.org/2000/svg">

      <!-- You -->
      <rect x="20" y="140" width="120" height="80" rx="12" fill="rgba(56,189,248,0.12)" stroke="rgba(56,189,248,0.4)" stroke-width="1.5"/>
      <text x="80" y="174" text-anchor="middle" fill="#38bdf8" font-family="Space Grotesk" font-weight="600" font-size="14">You</text>
      <text x="80" y="196" text-anchor="middle" fill="#a09bb8" font-family="Space Grotesk" font-size="11">Natural</text>
      <text x="80" y="210" text-anchor="middle" fill="#a09bb8" font-family="Space Grotesk" font-size="11">Language</text>

      <!-- Arrow right -->
      <line x1="140" y1="180" x2="190" y2="180" stroke="rgba(56,189,248,0.5)" stroke-width="1.5" marker-end="url(#arrowB)"/>
      <text x="165" y="170" text-anchor="middle" fill="#4b5563" font-family="Space Grotesk" font-size="10">"create file"</text>

      <defs>
        <marker id="arrowB" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
          <path d="M2 1L8 5L2 9" fill="none" stroke="rgba(56,189,248,0.7)" stroke-width="1.5" stroke-linecap="round"/>
        </marker>
        <marker id="arrowP" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
          <path d="M2 1L8 5L2 9" fill="none" stroke="rgba(124,109,250,0.7)" stroke-width="1.5" stroke-linecap="round"/>
        </marker>
        <marker id="arrowG" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
          <path d="M2 1L8 5L2 9" fill="none" stroke="rgba(52,211,153,0.7)" stroke-width="1.5" stroke-linecap="round"/>
        </marker>
      </defs>

      <!-- LLM Brain -->
      <rect x="200" y="100" width="180" height="160" rx="16" fill="rgba(124,109,250,0.15)" stroke="rgba(124,109,250,0.5)" stroke-width="1.5"/>
      <text x="290" y="132" text-anchor="middle" fill="#c4b5fd" font-family="Space Grotesk" font-weight="700" font-size="15">Claude LLM</text>
      <text x="290" y="152" text-anchor="middle" fill="#7c6dfa" font-family="Space Grotesk" font-size="12">(Sonnet / Opus)</text>
      <text x="290" y="185" text-anchor="middle" fill="#a09bb8" font-family="Space Grotesk" font-size="12">Understands intent</text>
      <text x="290" y="203" text-anchor="middle" fill="#a09bb8" font-family="Space Grotesk" font-size="12">Generates code</text>
      <text x="290" y="221" text-anchor="middle" fill="#a09bb8" font-family="Space Grotesk" font-size="12">Makes tool calls</text>
      <text x="290" y="243" text-anchor="middle" fill="#4b5563" font-family="Space Grotesk" font-size="11">↻ Feedback loop</text>

      <!-- Arrows to tools -->
      <line x1="380" y1="150" x2="430" y2="120" stroke="rgba(124,109,250,0.4)" stroke-width="1.5" marker-end="url(#arrowP)"/>
      <line x1="380" y1="180" x2="430" y2="180" stroke="rgba(124,109,250,0.4)" stroke-width="1.5" marker-end="url(#arrowP)"/>
      <line x1="380" y1="210" x2="430" y2="240" stroke="rgba(124,109,250,0.4)" stroke-width="1.5" marker-end="url(#arrowP)"/>

      <!-- Tool boxes -->
      <rect x="440" y="80" width="140" height="56" rx="10" fill="rgba(52,211,153,0.1)" stroke="rgba(52,211,153,0.35)" stroke-width="1.5"/>
      <text x="510" y="106" text-anchor="middle" fill="#34d399" font-family="Space Grotesk" font-weight="600" font-size="13">read / write</text>
      <text x="510" y="124" text-anchor="middle" fill="#4b5563" font-family="Space Grotesk" font-size="11">File System</text>

      <rect x="440" y="152" width="140" height="56" rx="10" fill="rgba(52,211,153,0.1)" stroke="rgba(52,211,153,0.35)" stroke-width="1.5"/>
      <text x="510" y="178" text-anchor="middle" fill="#34d399" font-family="Space Grotesk" font-weight="600" font-size="13">bash / glob</text>
      <text x="510" y="196" text-anchor="middle" fill="#4b5563" font-family="Space Grotesk" font-size="11">Terminal Commands</text>

      <rect x="440" y="224" width="140" height="56" rx="10" fill="rgba(52,211,153,0.1)" stroke="rgba(52,211,153,0.35)" stroke-width="1.5"/>
      <text x="510" y="250" text-anchor="middle" fill="#34d399" font-family="Space Grotesk" font-weight="600" font-size="13">web search</text>
      <text x="510" y="268" text-anchor="middle" fill="#4b5563" font-family="Space Grotesk" font-size="11">Real-time Lookup</text>

      <!-- Arrow to result -->
      <line x1="580" y1="180" x2="630" y2="180" stroke="rgba(52,211,153,0.5)" stroke-width="1.5" marker-end="url(#arrowG)"/>

      <!-- Result -->
      <rect x="640" y="140" width="130" height="80" rx="12" fill="rgba(52,211,153,0.1)" stroke="rgba(52,211,153,0.4)" stroke-width="1.5"/>
      <text x="705" y="170" text-anchor="middle" fill="#34d399" font-family="Space Grotesk" font-weight="600" font-size="14">File Created</text>
      <text x="705" y="190" text-anchor="middle" fill="#a09bb8" font-family="Space Grotesk" font-size="12">On Your Machine</text>
      <text x="705" y="208" text-anchor="middle" fill="#4b5563" font-family="Space Grotesk" font-size="11">✓ script.py saved</text>

      <!-- Label at bottom -->
      <text x="400" y="330" text-anchor="middle" fill="#4b5563" font-family="Space Grotesk" font-size="13">Claude Code = Claude LLM + Built-in Agentic Tools (runs in your terminal)</text>
    
</svg>
