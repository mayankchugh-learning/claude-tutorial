      <text x="400" y="118" text-anchor="middle" fill="#4b5563" font-family="Space Grotesk" font-size="10">/fetch-api</text>

      <!-- Result column -->
      <rect x="440" y="30" width="320" height="240" rx="12" fill="rgba(52,211,153,0.08)" stroke="rgba(52,211,153,0.3)" stroke-width="1.5"/>
      <text x="600" y="58" text-anchor="middle" fill="#34d399" font-family="Space Grotesk" font-weight="600" font-size="13">Claude Executes Automatically</text>
